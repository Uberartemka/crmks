# Nginx-конфиг для frontcrm (CRM)
# Установка (выполняется автоматически setup.sh, но для ручной):
#   sudo sed 's/__DOMAIN__/<твой-домен>/g' deploy/nginx-crmks.conf > /etc/nginx/sites-available/crmks
#   sudo ln -sf /etc/nginx/sites-available/crmks /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Редирект HTTP → HTTPS (после получения SSL)
server {
    listen 80;
    server_name __DOMAIN__;

    # ACME challenge для Let's Encrypt — ДО получения сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # До получения SSL-сертификата раздаём статику и проксируем API по HTTP.
    # После certbot --nginx этот блок заменится на редирект 301 → HTTPS.
    root /var/www/crmks/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kp/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: неизвестные пути → index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Основной HTTPS-сервер (раскомментируй ПОСЛЕ certbot --nginx,
# либо certbot сделает это автоматически)
server {
    listen 443 ssl http2;
    server_name __DOMAIN__;

    # SSL-сертификаты (получить через: sudo certbot --nginx -d __DOMAIN__)
    # ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Корень — собранный фронтенд (vite build → dist/)
    root /var/www/crmks/dist;
    index index.html;

    # Сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Кэширование статики (хэши в именах файлов от Vite — можно надолго)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Увеличенные таймауты для тяжёлых операций (PDF/КП, AI-агент)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # КП (коммерческие предложения) — тоже на бэкенд
    location /kp/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback: неизвестные пути → index.html (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрыть .env, .git и т.п.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

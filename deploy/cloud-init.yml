#cloud-config
#
# =============================================================================
# Cloud-init для frontcrm (CRM) на свежий Ubuntu 22.04/24.04 сервер.
#
# Использование:
#   1. СКОПИРУЙ этот файл и отредактируй блок «ПАРАМЕТРЫ» вверху.
#   2. При создании VPS у провайдера (Hetzner, DigitalOcean, AWS, Яндекс.Облако,
#      Selectel, и т.д.) вставь содержимое в поле «cloud-init / user-data».
#   3. Сервер поднимется сам: пакеты, БД, Redis, код, фронт, миграции,
#      systemd, nginx. Через ~5-10 минут CRM доступна по домену.
#   4. Лог установки: /var/log/cloud-init-output.log
#      Лог приложения: /var/log/crmks/{api,watchdog}.log
#
# Структура: параметры вверху → write_files (юниты + install-скрипт) →
# packages → runcmd (вызов install-скрипта).
# =============================================================================
#
# -----------------------------------------------------------------------------
# ⬇⬇⬇  ПАРАМЕТРЫ — ОТРЕДАКТИРУЙ ПЕРЕД ЗАПУСКОМ  ⬇⬇⬇
# -----------------------------------------------------------------------------
# Эти значения подставляются в install-скрипт через write_files ниже.
# ВАЖНО: cloud-init не интерполирует переменные между ключами, поэтому
# значения продублированы в content: блоках write_files. Меняй ИХ.

# 1. Домен CRM. Нет домена — IP сервера (тогда certbot пропускается).
#    Пример: crm.example.ru
# 2. Git-репозиторий. Публичный — без токена.
# 3. API-ключи — REPLACE_ME если не хочешь тащить секреты в metadata
#    провайдера. Заполни .env вручную после поднятия сервера.
# -----------------------------------------------------------------------------
# Все значения ниже парсятся из /etc/crmks-bootstrap.env install-скриптом.
# =============================================================================

write_files:
  # ---- Параметры (парсятся install-скриптом) ----
  - path: /etc/crmks-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ОТРЕДАКТИРУЙ под себя перед запуском cloud-init.
      CRMKS_DOMAIN="crm.example.ru"
      CRMKS_GIT_REPO="https://github.com/Uberartemka/crmks.git"
      CRMKS_GIT_BRANCH="main"
      CRMKS_INSTALL_PLAYWRIGHT="true"
      CRMKS_REQUEST_SSL="false"
      CRMKS_KIMI_API_KEY="REPLACE_ME"
      CRMKS_CF_ACCOUNT_ID="REPLACE_ME"
      CRMKS_CF_API_TOKEN="REPLACE_ME"
      CRMKS_CF_EMAIL="REPLACE_ME"
      CRMKS_SERPAPI_KEY="REPLACE_ME"

  # ---- systemd-юнит API ----
  - path: /etc/systemd/system/crmks-api.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=frontcrm FastAPI Backend (uvicorn)
      After=network.target postgresql.service redis-server.service
      Wants=postgresql.service redis-server.service

      [Service]
      Type=simple
      User=crmks
      Group=crmks
      WorkingDirectory=/var/www/crmks/backend
      EnvironmentFile=/var/www/crmks/backend/.env
      ExecStart=/var/www/crmks/backend/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000 --workers 4 --proxy-headers --forwarded-allow-ips '*'
      Restart=always
      RestartSec=5
      StandardOutput=append:/var/log/crmks/api.log
      StandardError=append:/var/log/crmks/api.log
      NoNewPrivileges=yes
      PrivateTmp=yes

      [Install]
      WantedBy=multi-user.target

  # ---- systemd-юнит watchdog ----
  - path: /etc/systemd/system/crmks-watchdog.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=frontcrm job_queue watchdog
      After=network.target postgresql.service
      Wants=postgresql.service

      [Service]
      Type=simple
      User=crmks
      Group=crmks
      WorkingDirectory=/var/www/crmks/backend
      EnvironmentFile=/var/www/crmks/backend/.env
      ExecStart=/var/www/crmks/backend/venv/bin/python -m watchdog
      Restart=always
      RestartSec=10
      StandardOutput=append:/var/log/crmks/watchdog.log
      StandardError=append:/var/log/crmks/watchdog.log
      NoNewPrivileges=yes
      PrivateTmp=yes

      [Install]
      WantedBy=multi-user.target

  # ---- Install-скрипт (вся логика) ----
  - path: /tmp/crmks-install.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      # ---- Цвета ----
      G='\033[0;32m'; Y='\033[1;33m'; R='\033[0;31m'; NC='\033[0m'
      info() { echo -e "${G}✓${NC} $1"; }
      warn() { echo -e "${Y}⚠${NC} $1"; }
      die()  { echo -e "${R}✗ $1${NC}"; exit 1; }
      step() { echo -e "\n${Y}=== $1 ===${NC}"; }

      # ---- Подгрузка параметров ----
      [ -f /etc/crmks-bootstrap.env ] || die "no /etc/crmks-bootstrap.env"
      set -a; source /etc/crmks-bootstrap.env; set +a

      APP_NAME="crmks"; APP_USER="crmks"
      SITE_DIR="/var/www/$APP_NAME"; LOG_DIR="/var/log/$APP_NAME"
      DB_NAME="hhb_b2b"; DB_USER="crmks"
      VENV_DIR="$SITE_DIR/backend/venv"

      # ---- Версия Python ----
      PY_BIN="$(command -v python3.12 || command -v python3.11 || command -v python3)"
      [ -n "$PY_BIN" ] || die "Python 3.11+ not found"
      info "Python: $PY_BIN ($($PY_BIN --version))"

      # ---- 1. Пользователь и директории ----
      step "1/9. Пользователь и директории"
      if ! id -u "$APP_USER" >/dev/null 2>&1; then
        useradd -r -m -d "/home/$APP_USER" -s /bin/bash "$APP_USER"
        info "Пользователь $APP_USER создан"
      else
        info "Пользователь $APP_USER уже есть"
      fi
      mkdir -p "$SITE_DIR" "$LOG_DIR"
      chown -R "$APP_USER:$APP_USER" "$SITE_DIR" "$LOG_DIR"

      # ---- 2. PostgreSQL ----
      step "2/9. PostgreSQL"
      DB_PASS="$(openssl rand -base64 18 | tr -dc 'a-zA-Z0-9' | head -c 24)"
      echo "${APP_NAME} db password: $DB_PASS" > "/root/${APP_NAME}_db_password.txt"
      chmod 600 "/root/${APP_NAME}_db_password.txt"
      # Создаём пользователя, если ещё нет (через DO-блок без heredoc)
      sudo -u postgres psql -tAc "SELECT 1 FROM pg_user WHERE usename='$DB_USER'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE USER $DB_USER WITH PASSWORD '$DB_PASS';"
      sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE DATABASE $DB_NAME OWNER $DB_USER ENCODING 'UTF8' LC_COLLATE 'ru_RU.UTF-8' LC_CTYPE 'ru_RU.UTF-8' TEMPLATE template0;"
      sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER;" >/dev/null
      info "БД '$DB_NAME' готова. Пароль: /root/${APP_NAME}_db_password.txt"

      # ---- 3. Redis ----
      step "3/9. Redis"
      REDIS_PASS="$(openssl rand -base64 18 | tr -dc 'a-zA-Z0-9' | head -c 24)"
      echo "${APP_NAME} redis password: $REDIS_PASS" > "/root/${APP_NAME}_redis_password.txt"
      chmod 600 "/root/${APP_NAME}_redis_password.txt"
      if ! grep -q "^requirepass" /etc/redis/redis.conf; then
        echo "requirepass $REDIS_PASS" >> /etc/redis/redis.conf
        systemctl restart redis-server
        info "Redis защищён паролем"
      else
        REDIS_PASS="$(grep '^requirepass' /etc/redis/redis.conf | awk '{print $2}')"
        warn "Redis уже имеет requirepass — используется существующий"
      fi

      # ---- 4. Клонирование ----
      step "4/9. Git clone"
      if [ -d "$SITE_DIR/.git" ]; then
        warn "Репозиторий уже существует — git pull"
        cd "$SITE_DIR" && sudo -u "$APP_USER" git fetch --all && sudo -u "$APP_USER" git reset --hard "origin/$CRMKS_GIT_BRANCH"
      else
        sudo -u "$APP_USER" git clone --branch "$CRMKS_GIT_BRANCH" "$CRMKS_GIT_REPO" "$SITE_DIR"
        info "Склонировано в $SITE_DIR"
      fi
      chown -R "$APP_USER:$APP_USER" "$SITE_DIR"

      # ---- 5. Backend venv ----
      step "5/9. Backend: venv + deps"
      if [ ! -d "$VENV_DIR" ]; then
        sudo -u "$APP_USER" bash -c "cd '$SITE_DIR/backend' && '$PY_BIN' -m venv venv && ./venv/bin/pip install --upgrade pip --quiet && ./venv/bin/pip install -r requirements.txt --quiet"
        info "venv создан"
      else
        sudo -u "$APP_USER" "$VENV_DIR/bin/pip" install -r "$SITE_DIR/backend/requirements.txt" --quiet
        info "venv обновлён"
      fi

      # ---- 5b. Playwright (опционально) ----
      if [ "$CRMKS_INSTALL_PLAYWRIGHT" = "true" ]; then
        step "5b. Playwright + Chromium"
        sudo -u "$APP_USER" bash -c "$VENV_DIR/bin/playwright install chromium --with-deps" || \
          warn "Playwright завершился с предупреждениями"
        info "Chromium установлен"
      else
        warn "Playwright пропущен. Поставить: $VENV_DIR/bin/playwright install chromium --with-deps"
      fi

      # ---- 6. Frontend build ----
      step "6/9. Frontend: npm build"
      if [ -f "$SITE_DIR/package.json" ]; then
        sudo -u "$APP_USER" bash -c "cd '$SITE_DIR' && npm ci --silent && npm run build"
        [ -d "$SITE_DIR/dist" ] && info "Фронт собран в dist/" || warn "dist/ не найден — проверь package.json"
      else
        warn "package.json не найден — пропуск"
      fi

      # ---- 7. .env ----
      step "7/9. .env"
      BACKEND_ENV="$SITE_DIR/backend/.env"
      if [ ! -f "$BACKEND_ENV" ]; then
        if [ "$CRMKS_DOMAIN" = "" ] || echo "$CRMKS_DOMAIN" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
          API_BASE="/api"
        else
          API_BASE="https://$CRMKS_DOMAIN/api"
        fi
        # Пишем .env построчно (без heredoc — он ломает YAML)
        : > "$BACKEND_ENV"
        echo "DATABASE_URL=postgresql://$DB_USER:$DB_PASS@localhost:5432/$DB_NAME" >> "$BACKEND_ENV"
        echo "REDIS_URL=redis://:$REDIS_PASS@127.0.0.1:6379/0" >> "$BACKEND_ENV"
        echo "TOKEN_TTL_SECONDS=86400" >> "$BACKEND_ENV"
        echo "REDIS_FAIL_FAST=0" >> "$BACKEND_ENV"
        echo "KIMI_API_KEY=$CRMKS_KIMI_API_KEY" >> "$BACKEND_ENV"
        echo "KIMI_TIMEOUT_SEC=25" >> "$BACKEND_ENV"
        echo "KIMI_MAX_WORKERS=8" >> "$BACKEND_ENV"
        echo "AI_CALL_TIMEOUT_SEC=30" >> "$BACKEND_ENV"
        echo "CF_ACCOUNT_ID=$CRMKS_CF_ACCOUNT_ID" >> "$BACKEND_ENV"
        echo "CF_API_TOKEN=$CRMKS_CF_API_TOKEN" >> "$BACKEND_ENV"
        echo "CF_MODEL=@cf/moonshotai/kimi-k2.5" >> "$BACKEND_ENV"
        echo "CF_EMAIL=$CRMKS_CF_EMAIL" >> "$BACKEND_ENV"
        echo "SERPAPI_KEY=$CRMKS_SERPAPI_KEY" >> "$BACKEND_ENV"
        chown "$APP_USER:$APP_USER" "$BACKEND_ENV"
        chmod 600 "$BACKEND_ENV"
        info "backend/.env создан"
      else
        warn "backend/.env уже есть — не перезаписываю"
      fi
      ROOT_ENV="$SITE_DIR/.env"
      [ -f "$ROOT_ENV" ] || { echo -e "VITE_API_BASE_URL=$API_BASE\nVITE_USE_MOCKS=false" > "$ROOT_ENV"; chown "$APP_USER:$APP_USER" "$ROOT_ENV"; }

      # ---- 8. Миграции БД ----
      step "8/9. Миграции БД"
      sudo -u "$APP_USER" bash -c "cd '$SITE_DIR/backend' && DATABASE_URL='postgresql://$DB_USER:$DB_PASS@localhost:5432/$DB_NAME' $VENV_DIR/bin/python -c 'from migrations.runner import apply_all; apply_all(\"postgresql://$DB_USER:$DB_PASS@localhost:5432/$DB_NAME\")'" || warn "Миграция упала — проверь подключение"
      info "Миграции применены"

      # ---- 9. systemd + nginx + ufw ----
      step "9/9. systemd + nginx + файрвол"
      systemctl daemon-reload
      systemctl enable crmks-api crmks-watchdog
      systemctl restart crmks-api crmks-watchdog
      info "Сервисы crmks-api и crmks-watchdog запущены"

      # nginx
      if [ -n "$CRMKS_DOMAIN" ]; then
        NGINX_CONF="/etc/nginx/sites-available/$APP_NAME"
        sed "s|__DOMAIN__|$CRMKS_DOMAIN|g" "$SITE_DIR/deploy/nginx-crmks.conf" > "$NGINX_CONF"
        ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
        rm -f /etc/nginx/sites-enabled/default
        nginx -t && systemctl reload nginx
        info "Nginx настроен для $CRMKS_DOMAIN"

        # SSL
        if [ "$CRMKS_REQUEST_SSL" = "true" ]; then
          step "SSL: certbot"
          certbot --nginx -d "$CRMKS_DOMAIN" --non-interactive --agree-tos -m "admin@$CRMKS_DOMAIN" --redirect || warn "certbot не смог — проверь DNS и запусти вручную"
          info "SSL получен"
        else
          warn "SSL пропущен. Когда DNS будет готов: sudo certbot --nginx -d $CRMKS_DOMAIN"
        fi
      else
        warn "Домен не указан — nginx не настроен. API: http://localhost:8000"
      fi

      # ufw
      ufw allow 'Nginx Full' >/dev/null 2>&1 || true
      ufw allow OpenSSH >/dev/null 2>&1 || true
      ufw --force enable >/dev/null 2>&1 || true

      echo ""
      echo "=============================================="
      echo -e "${G}✓ CRMKS УСТАНОВЛЕНА${N}"
      echo "=============================================="
      echo "Сервисы:    systemctl status crmks-api crmks-watchdog"
      echo "Логи:       /var/log/crmks/{api,watchdog}.log"
      echo "Пароли:     /root/${APP_NAME}_db_password.txt, /root/${APP_NAME}_redis_password.txt"
      if [ -n "$CRMKS_DOMAIN" ] && [ "$CRMKS_REQUEST_SSL" != "true" ]; then
        echo "SSL:        sudo certbot --nginx -d $CRMKS_DOMAIN"
      fi
      echo "API:        curl http://127.0.0.1:8000/docs"

package_update: true
packages:
  - python3
  - python3-venv
  - python3-pip
  - nodejs
  - npm
  - nginx
  - postgresql
  - postgresql-contrib
  - redis-server
  - certbot
  - python3-certbot-nginx
  - git
  - ufw
  - curl
  - wget

# Главная команда: запустить install-скрипт, записанный через write_files.
# Специальный sentinel «.» в начале чтобы лог шёл в cloud-init-output.log.
runcmd:
  - [ bash, -lc, "bash /tmp/crmks-install.sh 2>&1 | tee -a /var/log/crmks-install.log" ]
